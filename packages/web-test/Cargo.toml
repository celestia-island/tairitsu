[package]
name = "tairitsu-web-test"
version = "0.1.0"
edition = "2024"
description = "Visual regression and event bridge tests via debug API"
publish = false

[[test]]
name = "visual"
path = "tests/visual.rs"

[[test]]
name = "events"
path = "tests/events.rs"

[dependencies]
anyhow = "^1"
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
base64 = "^0.22"
image = "^0.25"
reqwest = { version = "^0.12", features = ["blocking", "json"] }

[dev-dependencies]
tairitsu-packager = { path = "../packager" }
