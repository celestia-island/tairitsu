[package]
name = "tairitsu-macros"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Procedural macros for Tairitsu framework (rsx!, scss!, component, wit_interface!, etc.)"

[lib]
proc-macro = true

[dependencies]
proc-macro2 = "^1"
quote = "^1"
syn = { version = "^2", features = ["full", "parsing"] }
grass = "^0.13"
sha2 = "^0.10"
hex = "^0.4"
regex = "^1"
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
