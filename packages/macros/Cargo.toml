[package]
name = "tairitsu-macros"
version = "0.3.0"
edition = "2021"

[lib]
proc-macro = true

[dependencies]
# Basic language and tools
proc-macro2 = "^1"
quote = "^1"
syn = { version = "^2", features = ["full", "parsing"] }

# SCSS compiler
grass = "^0.13"

# Hashing for class names
sha2 = "^0.10"
hex = "^0.4"

# SVG sanitization
regex = "^1"
