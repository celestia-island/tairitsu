[package]
name = "tairitsu-mcp"
version.workspace = true
edition.workspace = true
description = "Tairitsu MCP server — browser automation + VTty for AI coding assistants"
authors.workspace = true
license = "MIT OR Apache-2.0"
repository.workspace = true

[[bin]]
name = "tairitsu-mcp"
path = "src/main.rs"

[dependencies]
anyhow = "^1"
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
tokio = { version = "^1", default-features = false, features = [
  "rt",
  "rt-multi-thread",
  "macros",
  "time",
  "io-util",
  "io-std",
] }
tracing = "^0.1"
tracing-subscriber = { version = "^0.3", features = ["env-filter"] }
reqwest = { version = "^0.12", features = ["json"] }
vte = { version = "^0.15", optional = true }
portable-pty = { version = "^0.8", optional = true }
schemars = "1"
rmcp = { version = "1", features = ["server", "transport-io", "macros", "schemars"] }
ab_glyph = { version = "^0.2", optional = true }
image = { version = "^0.25", optional = true }
base64 = { version = "^0.22", optional = true }
unicode-width = { version = "^0.2", optional = true }

[target.'cfg(unix)'.dependencies]
libc = "^0.2"

[features]
default = ["vtty", "vtty-visual"]
vtty = ["vte", "portable-pty"]
vtty-visual = ["vtty", "dep:ab_glyph", "dep:image", "dep:base64", "dep:unicode-width"]
