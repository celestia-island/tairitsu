[package]
name = "tairitsu-web"
version = "0.1.0"
description = "Web platform implementation for Tairitsu"
authors.workspace = true
license.workspace = true
edition.workspace = true

[dependencies]
tairitsu-vdom = { path = "../vdom" }
tairitsu-hooks = { path = "../hooks" }

# Basic language and tools
anyhow = "^1"

# Data and serialization
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"

# Logging and tracing
tracing = "^0.1"

# WIT component-model binding generator (wasm32-wasip2 target, optional)
wit-bindgen = { version = "^0.50", features = ["macros"], optional = true }

[features]
default = []

# WIT component-model bindings (wasm32-wasip2 target)
# Enable this feature and target wasm32-wasip2 to use WIT-generated bindings.
wit-bindings = ["dep:wit-bindgen"]

[dev-dependencies]
tokio = { workspace = true, default-features = false, features = ["sync", "macros", "io-util", "rt", "time"] }

[build-dependencies]
toml = "^0.8"

[package.metadata.docs.rs]
features = ["wit-bindings"]
