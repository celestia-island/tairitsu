[package]
name = "tairitsu-shared"
version.workspace = true
edition = "2024"
description = "Shared types for tairitsu host-plugin IPC communication"
license = "MIT OR Apache-2.0"

[dependencies]
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
interprocess = { version = "^2", features = ["tokio"] }

[features]
default = []
