[package]
name = "tairitsu-mcp-plugin-browser"
version.workspace = true
edition = "2024"
description = "Tairitsu MCP browser plugin — headless Chromium CDP automation (debug API)"
license = "MIT OR Apache-2.0"

[[bin]]
name = "tairitsu-plugin-debug-browser"
path = "src/main.rs"

[dependencies]
tairitsu-shared = { workspace = true }
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
chromiumoxide = { version = "^0.9", features = ["fetcher", "native-tls", "zip0"] }
tokio = { version = "^1", default-features = false, features = [
    "rt", "rt-multi-thread", "sync", "macros", "time",
    "io-util",
] }
futures = "^0.3"
axum = { version = "^0.8" }
tower-http = { version = "^0.6", features = ["fs", "cors", "compression-gzip"] }
tracing = "^0.1"
tracing-subscriber = { version = "^0.3", features = ["env-filter"] }
base64 = "^0.22"
anyhow = "^1"
interprocess = "^2"

[build-dependencies]

[features]
default = []
