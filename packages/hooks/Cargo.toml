[package]
name = "tairitsu-hooks"
version = "0.1.0"
description = "Hooks system for Tairitsu"
authors.workspace = true
license.workspace = true
edition.workspace = true

[features]
default = []

[dependencies]
tairitsu-vdom = { path = "../vdom" }

# Basic language and tools
anyhow = "^1"

# Logging and tracing
tracing = "^0.1"

[dev-dependencies]
tokio = { workspace = true, default-features = false, features = [
  "sync",
  "macros",
  "io-util",
  "rt",
  "time",
] }
tairitsu-macros = { path = "../macros" }
