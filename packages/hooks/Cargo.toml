[package]
name = "tairitsu-hooks"
version = "0.1.0"
description = "Hooks system for Tairitsu"
authors.workspace = true
license.workspace = true
edition.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []

[dependencies]
tairitsu-vdom = { path = "../vdom" }

# Basic language and tools
anyhow = "^1"

# Logging and tracing
tracing = "^0.1"

# WASM Component Model bindings (wasm32 target only)
[target.'cfg(target_family = "wasm")'.dependencies]
wit-bindgen = { version = "^0.50", features = ["macros"] }

[dev-dependencies]
tokio = { workspace = true, default-features = false, features = [
  "sync",
  "macros",
  "io-util",
  "rt",
  "time",
] }
tairitsu-macros = { path = "../macros" }
