[package]
name = "tairitsu-style"
version = "0.1.0"
edition.workspace = true
description = "Type-safe CSS property builders for Tairitsu framework"
license.workspace = true
authors.workspace = true

[dependencies]
# Workspace dependencies
tairitsu-vdom = { path = "../vdom" }

# Basic language and tools
thiserror = "^2"

[build-dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[features]
default = []
