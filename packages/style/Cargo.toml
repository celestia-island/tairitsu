[package]
name = "tairitsu-style"
version = "0.1.0"
edition = "2021"
description = "Type-safe CSS property builders for Tairitsu framework"
license = "MIT"
authors = ["langyo <langyo.china@gmail.com>"]

[dependencies]
# Workspace dependencies
tairitsu-vdom = { path = "../vdom" }

# Basic language and tools
thiserror = "^2"

[build-dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[features]
default = []
