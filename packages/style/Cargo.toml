[package]
name = "tairitsu-style"
version = "0.1.0"
edition.workspace = true
description = "Type-safe CSS property builders for Tairitsu framework"
license.workspace = true
authors.workspace = true

[dependencies]
# Workspace dependencies
tairitsu-vdom = { path = "../vdom" }
tairitsu-css-values = { path = "../css-values", optional = true }

# Basic language and tools
thiserror = "^2"

[build-dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[features]
default = ["css-values"]
css-values = ["tairitsu-css-values"]
