[package]
name = "tairitsu"
version.workspace = true
edition.workspace = true
publish = true
authors.workspace = true
description = "A WebAssembly runtime for running component-model based WASM modules"
license = "Apache-2.0"
repository.workspace = true

[features]
default = []
dynamic = []

[dependencies]
tairitsu-macros = { workspace = true }
anyhow = "^1"
bytes = "^1"
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
ron = "^0.8"
wasmtime = { version = "^43", features = ["component-model"] }
wasmtime-wasi = "^43"
wit-component = "^0.243"
wit-parser = "^0.243"

[build-dependencies]
wit-parser = "^0.243"
