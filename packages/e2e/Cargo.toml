[package]
name = "tairitsu-e2e"
version = "0.1.0"
description = "E2E testing framework for Tairitsu"
authors = ["langyo <langyo.china@gmail.com>"]
license = "MIT OR Apache-2.0"
edition = "2021"

[dependencies]
# Selenium WebDriver for E2E testing
thirtyfour = { version = "^0.34", features = ["reqwest"] }

# Chromiumoxide for headless Chrome screenshots
chromiumoxide = { version = "^0.8", features = ["tokio-runtime"] }

# HTML parsing and assertions
scraper = "^0.20"

# Async runtime
tokio = { workspace = true }
async-trait = "^0.1"

# Logging and tracing
log = "^0.4"
tracing = "^0.1"
tracing-subscriber = { version = "^0.3", features = ["env-filter"] }

# Serde for config
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"

# Utilities
anyhow = "^1"
chrono = "^0.4"
futures = "^0.3"
tempfile = "^3"

# SSR testing
tairitsu-ssr = { path = "../ssr" }

# TOML parsing
toml = "^0.8"

# Command line parsing
clap = { version = "^4", features = ["derive"] }

# Image processing for visual tests
image = "^0.25"

[[bin]]
name = "tairitsu-e2e"
path = "src/main.rs"

[dev-dependencies]
