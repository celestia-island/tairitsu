[package]
name = "tairitsu-packager"
version = "0.1.0"
edition = "2024"
description = "Build and packaging tool for Tairitsu applications"
authors = ["langyo <langyo.china@gmail.com>"]
license = "MIT OR Apache-2.0"

[[bin]]
name = "tairitsu"
path = "src/main.rs"

[dependencies]
# Workspace dependencies
tairitsu-vdom = { path = "../vdom", optional = true }
tairitsu-browser-wit-resolver = { path = "../browser-wit-resolver" }
tairitsu-browser-worlds = { path = "../browser-worlds" }
tairitsu-ssr = { path = "../ssr", optional = true }

# Basic language and tools
anyhow = "^1"
thiserror = "^2"

# Data and serialization
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
toml = "^0.8"

# Async runtime (only for native targets)
tokio = { version = "^1", default-features = false, features = [
  "sync",
  "macros",
  "io-util",
  "rt",
  "rt-multi-thread",
  "time",
  "signal",
], optional = true }
futures = "^0.3"

# Logging and tracing
tracing = "^0.1"
tracing-subscriber = { version = "^0.3", features = ["env-filter"] }

# CLI (optional for build-only usage)
clap = { version = "^4", features = ["derive"], optional = true }

# Progress bars
indicatif = "^0.17"

# Browser opener
webbrowser = "^1"

# File system
walkdir = "^2"
notify = { version = "^6", optional = true }

# HTTP server (for dev server)
axum = { version = "^0.8", optional = true }
tower-http = { version = "^0.6", features = ["fs", "cors", "compression-gzip"], optional = true }
tokio-stream = { version = "^0.1", features = ["sync"], optional = true }

# Embedded WebView for debug/inspection API (cross-platform via wry)
wry = "^0.48"
tao = "^0.30"

# WASM tools (optional)
# SCSS compiler
grass = "^0.13"

# Regex for extraction
regex = "^1"

# Hashing for resource cache busting
sha2 = "^0.10"

yuuka = "0.6"
sys-locale = "0.3"
crossterm = { version = "0.28", optional = true }
chrono = { version = "0.4", default-features = false, features = [
  "clock",
  "serde",
] }

# TTY detection
atty = "0.2"

# HTTP client for icon fetching (optional)
reqwest = { version = "^0.12", features = [
  "blocking",
  "json",
  "stream",
], optional = true }

# ZIP file handling for icon packages (optional)
zip = { version = "^2", default-features = false, features = [
  "deflate",
], optional = true }

# Image processing for visual diffing
image = { version = "^0.25", optional = true }
base64 = { version = "^0.22", optional = true }

# Embed browser-glue at compile time
include_dir = "^0.7"

[dev-dependencies]
tempfile = "3"

[features]
default = ["tokio", "native", "cli", "dev-server", "ssr", "icon-fetch", "debug-browser", "visual-diff", "test-runner"]
native = ["tokio", "crossterm"]
dev-server = [
  "axum",
  "tower-http",
  "notify",
  "tairitsu-ssr",
  "tokio",
  "tokio-stream",
]
debug-browser = ["dev-server", "reqwest"]
ssr = ["tairitsu-ssr", "tokio"]
cli = ["clap"]
icon-fetch = ["reqwest", "zip"]
visual-diff = ["image", "base64"]
test-runner = ["reqwest", "image", "base64"]

[target.'cfg(target_os = "linux")'.dependencies]
 libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = [
  "Win32_Foundation",
  "Win32_Security",
  "Win32_Storage_FileSystem",
  "Win32_System_Console",
  "Win32_System_Threading",
] }
