[package]
name = "tairitsu-packager"
version = "0.1.0"
edition = "2021"
description = "Build and packaging tool for Tairitsu applications"
authors = ["Tairitsu Contributors"]
license = "MIT OR Apache-2.0"

[[bin]]
name = "tairitsu"
path = "src/main.rs"

[dependencies]
# Workspace dependencies
tairitsu-vdom = { path = "../vdom", optional = true }
tairitsu-browser-wit-resolver = { path = "../browser-wit-resolver" }
tairitsu-browser-worlds = { path = "../browser-worlds" }
tairitsu-ssr = { path = "../ssr", optional = true }

# Basic language and tools
anyhow = "^1"
thiserror = "^2"

# Data and serialization
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
toml = "^0.8"

# Async runtime
tokio = { workspace = true }
futures = "^0.3"

# Logging and tracing
tracing = "^0.1"
tracing-subscriber = { version = "^0.3", features = ["env-filter"] }

# CLI
clap = { version = "^4", features = ["derive"] }

# Progress bars
indicatif = "^0.17"

# Browser opener
webbrowser = "^1"

# File system
walkdir = "^2"
notify = { version = "^6", optional = true }

# HTTP server (for dev server)
axum = { version = "^0.8", optional = true }
tower-http = { version = "^0.6", features = ["fs"], optional = true }

# WASM tools (optional)
# SCSS compiler
grass = "^0.13"

# Regex for extraction
regex = "^1"

# Hashing for resource cache busting
sha2 = "^0.10"

yuuka = "0.6"
sys-locale = "0.3"
crossterm = "0.28"
chrono = { version = "0.4", default-features = false, features = ["clock"] }

# HTTP client for icon fetching (optional)
reqwest = { version = "^0.12", features = ["blocking", "json", "stream"], optional = true }

# ZIP file handling for icon packages (optional)
zip = { version = "^2", default-features = false, features = ["deflate"], optional = true }

# Embed browser-glue at compile time
include_dir = "^0.7"

[features]
default = ["dev-server"]
native = []
dev-server = ["axum", "tower-http", "notify", "tairitsu-ssr"]
ssr = ["tairitsu-ssr"]
# Enable remote icon fetching from MDI, Lucide, etc.
icon-fetch = ["reqwest", "zip"]
