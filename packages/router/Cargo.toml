[package]
name = "tairitsu-router"
version = "0.1.0"
edition.workspace = true
description = "File-system based routing for Tairitsu framework"
license.workspace = true
authors.workspace = true

[dependencies]
# VDOM for rendering
tairitsu-vdom = { path = "../vdom" }

# Regex for dynamic routes
regex = "1.11"

# Serialization
serde = { version = "1.0", features = ["derive"], optional = true }

[features]
default = []
serde = ["dep:serde"]
