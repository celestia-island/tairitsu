[package]
name = "tairitsu-vdom"
version = "0.1.0"
description = "Virtual DOM core for Tairitsu - Platform abstraction, reactive system, and VNode"
authors.workspace = true
license.workspace = true
edition.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Basic language and tools
anyhow = "^1"

# Data and serialization
serde = { version = "^1", features = ["derive"] }

# Logging and tracing
tracing = "^0.1"

# WASM Component Model bindings (wasm32 target only)
[target.'cfg(target_family = "wasm")'.dependencies]
wit-bindgen = { version = "^0.50", features = ["macros"] }

[dev-dependencies]
tokio = { workspace = true, default-features = false, features = [
  "sync",
  "macros",
  "io-util",
  "rt",
  "time",
] }
tairitsu-macros = { path = "../macros" }
