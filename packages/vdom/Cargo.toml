[package]
name = "tairitsu-vdom"
version = "0.1.0"
description = "Virtual DOM core for Tairitsu - Platform abstraction, reactive system, and VNode"
authors.workspace = true
license = "MIT OR Apache-2.0"
edition = "2021"

[dependencies]
# Basic language and tools
anyhow = "^1"

# Data and serialization
serde = { version = "^1", features = ["derive"] }

# Logging and tracing
tracing = "^0.1"

[dev-dependencies]
tokio = { workspace = true, default-features = false, features = [
  "sync",
  "macros",
  "io-util",
  "rt",
  "time",
] }
tairitsu-macros = { path = "../macros" }
