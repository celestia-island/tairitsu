[package]
name = "tairitsu-testing"
version = "0.1.0"
description = "Testing utilities for Tairitsu"
authors = ["Tairitsu Contributors"]
license = "MIT OR Apache-2.0"
edition = "2021"

[dependencies]
tairitsu-vdom = { path = "../vdom" }

# Basic language and tools
anyhow = "^1"

# Data and serialization
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"

# Image processing
image = "^0.25"

# Logging and tracing
tracing = "^0.1"

[dev-dependencies]
tokio = { workspace = true }
