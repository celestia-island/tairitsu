[package]
name = "tairitsu-browser-worlds"
version = "0.1.0"
edition = "2021"
description = "WIT world definitions for browser/W3C APIs (DOM, Events, Fetch, Canvas)"
authors = ["Tairitsu Contributors"]
license = "MIT OR Apache-2.0"

# Include WIT files in published crate.
include = ["src/**/*", "wit/**/*", "Cargo.toml", "README.md"]

[dependencies]
# Basic language and tools
anyhow = "^1"

# Data and serialization
serde = { version = "^1", features = ["derive"] }

[dev-dependencies]
wit-parser = "^0.243"
