[package]
name = "tairitsu-browser-wit-resolver"
version.workspace = true
edition.workspace = true
description = "WIT package version resolution, cloud fetch, and local cache for Tairitsu browser worlds"
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
tairitsu-browser-worlds = { workspace = true, optional = true }
anyhow = "^1"
thiserror = "^2"
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
tracing = "^0.1"
reqwest = { version = "^0.12", features = [
  "blocking",
  "json",
], optional = true }
sha2 = "^0.10"
hex = "^0.4"

[features]
default = ["embedded"]
fetch = ["reqwest"]
embedded = ["tairitsu-browser-worlds"]

[dev-dependencies]
tempfile = "^3"
