[package]
name = "tairitsu-ssr"
edition.workspace = true
authors.workspace = true

[dependencies]
tairitsu = { path = "../runtime" }
tairitsu-vdom = { path = "../vdom" }
tairitsu-browser-worlds = { path = "../browser-worlds" }
anyhow = "1"
wasmtime = { version = "40", features = ["component-model"] }
wasmtime-wasi = "40"
wit-parser = "0.201"
tracing = "0.1"
bytes = "1"
serde = { version = "1", features = ["derive"] }
futures = { version = "0.3", optional = true }
async-stream = { version = "0.3", optional = true }
tokio = { version = "1.41", features = ["full"], optional = true }
tokio-stream = { version = "0.1", optional = true, default-features = false }

[features]
default = []
streaming = ["tokio", "tokio-stream", "futures", "async-stream"]

[build-dependencies]
tairitsu = { path = "../runtime" }
wit-parser = "0.201"
heck = "0.5"
