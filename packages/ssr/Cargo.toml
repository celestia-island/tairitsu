[package]
name = "tairitsu-ssr"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Server-Side Rendering engine for Tairitsu WASM components"

[dependencies]
tairitsu = { workspace = true }
tairitsu-vdom = { workspace = true }
tairitsu-hooks = { workspace = true, optional = true }
tairitsu-browser-worlds = { workspace = true }
anyhow = "1"
wasmtime = { version = "43", features = ["component-model"] }
wasmtime-wasi = "43"
tracing = "0.1"
log = "0.4"
bytes = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.11", features = ["v4"] }
regex = { version = "1.11" }
async-trait = { version = "0.1" }
reqwest = { version = "0.12", features = ["json"], optional = true }
futures = { version = "0.3", optional = true }
async-stream = { version = "0.3", optional = true }
tokio = { version = "1.41", features = ["full"], optional = true }
tokio-stream = { version = "0.1", optional = true, default-features = false }

[features]
default = []
streaming = ["tokio", "tokio-stream", "futures", "async-stream"]
hmr = []
fast-refresh = ["dep:tairitsu-hooks", "hmr"]
error-overlay = ["hmr"]
data-fetcher = ["tokio", "dep:reqwest"]
dev = ["hmr", "fast-refresh", "error-overlay", "data-fetcher"]

[build-dependencies]
