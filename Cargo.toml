[workspace]
members = [
    "packages/runtime",
    "packages/macros",
    "packages/vdom",
    "packages/web",
    "packages/hooks",
    "packages/i18n",
    "packages/packager",
    "packages/e2e",
    "packages/style",
    "packages/browser-wit-resolver",
    "packages/browser-worlds",
    "packages/browser-test",
    "packages/ssr",
    "examples/wit-compile-time",
    "examples/wit-runtime",
    "examples/wit-dynamic-advanced",
    "examples/wit-native-simple",
    "examples/wit-native-macro",
    "examples/website",
    "examples/hikari-ssr-test",
    "examples/mouse-events-test",
]
resolver = "2"

[patch.crates-io]
# Local development version for easier debugging
tairitsu-macros = { path = "packages/macros" }
# Force wasm-compatible tokio features for all crates
tokio = { version = "^1", default-features = false, features = ["sync", "macros", "io-util", "rt", "time", "signal"] }
# Patch crates with wasip2 compatibility issues
which = { git = "https://github.com/harryfei/which-rs.git", rev = "4b84c2c" }

[profile.release]
lto = true
opt-level = 'z'
codegen-units = 1
panic = "abort"

[workspace.dependencies]
# Tokio - only wasm-compatible features (sync,macros,io-util,rt,time,signal)
# All packages should use: tokio = { workspace = true }
tokio = { version = "^1", default-features = false, features = ["sync", "macros", "io-util", "rt", "time", "signal"] }
