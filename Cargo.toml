[workspace]
members = [
    "packages/runtime",
    "packages/macros",
    "packages/vdom",
    "packages/web",
    "packages/hooks",
    "packages/packager",
    "packages/e2e",
    "packages/style",
    "packages/browser-wit-resolver",
    "packages/browser-worlds",
    "packages/browser-test",
    "packages/ssr",
    "examples/wit-compile-time",
    "examples/wit-runtime",
    "examples/wit-dynamic-advanced",
    "examples/wit-native-simple",
    "examples/wit-native-macro",
    "examples/website",
]
resolver = "2"

[patch.crates-io]
# Local development version for easier debugging
tairitsu-macros = { path = "packages/macros" }

[profile.release]
lto = true
opt-level = 'z'
codegen-units = 1
panic = "abort"

[profile.dev-wasm]
inherits = "release"
lto = true
opt-level = 'z'
codegen-units = 1
panic = "abort"

[workspace.package]
authors = ["langyo <langyo.china@gmail.com>"]
edition = "2024"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# Tokio - only wasm-compatible features (sync,macros,io-util,rt,time,signal)
# All packages should use: tokio = { workspace = true }
tokio = { version = "^1", default-features = false, features = [
    "sync",
    "macros",
    "io-util",
    "rt",
    "time",
    "signal",
] }
