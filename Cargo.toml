[workspace]
members = [
    "packages/runtime",
    "packages/macros",
    "packages/vdom",
    "packages/web",
    "packages/hooks",
    "packages/packager",
    "packages/e2e",
    "examples/wit-compile-time",
    "examples/wit-runtime",
    "examples/wit-dynamic-advanced",
    "examples/wit-native-simple",
    "examples/wit-native-macro",
    "examples/web-demo",
    "examples/website",
]
resolver = "2"

[patch.crates-io]
# Local development version for easier debugging
tairitsu-macros = { path = "packages/macros" }

[profile.release]
lto = true
opt-level = 'z'
codegen-units = 1
panic = "abort"
