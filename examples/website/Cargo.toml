[package]
name = "tairitsu-website"
version = "0.1.0"
edition = "2021"
description = "Tairitsu framework website demo - showcasing rsx!, builders, and reactive system"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Tairitsu framework packages
tairitsu-vdom = { path = "../../packages/vdom" }
tairitsu-hooks = { path = "../../packages/hooks" }
tairitsu-macros = { path = "../../packages/macros" }
tairitsu-web = { path = "../../packages/web", features = ["wit-bindings"] }

# Logging and error handling
tracing = "^0.1"
tracing-wasm = "^0.2"
anyhow = "^1"

# Tairitsu Package configuration (replaces HTML template)
[package.metadata.tairitsu]
app-name = "Tairitsu Framework Demo"
title = "Tairitsu - Rust Web Framework Demo"
description = "Comprehensive demo showcasing Virtual DOM, rsx! macro, Builders, and Reactive System"

[package.metadata.tairitsu.build]
target = "component"
output-dir = "dist"
optimize = true
sourcemap = true

[package.metadata.tairitsu.dev]
port = 3000
hot-reload = true
open-browser = true

[package.metadata.tairitsu.html]
lang = "zh-CN"
charset = "UTF-8"
viewport = "width=device-width, initial-scale=1.0"
favicon = "public/favicon.ico"
head = """
<meta name="theme-color" content="#667eea">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    line-height: 1.6;
    color: #333;
    background: #f5f5f5;
  }
  #app {
    min-height: 100vh;
  }
</style>
"""
body-class = "tairitsu-app"

[package.metadata.tairitsu.assets]
inline-limit = 8192
include = ["public/**"]
exclude = ["**/*.md"]

[package.metadata.tairitsu.css]
autoprefixer = true
minify = true

[package.metadata.tairitsu.native]
identifier = "com.tairitsu.website"
icon = "public/icon.png"
copyright = "Copyright 2024 Tairitsu"

[package.metadata.tairitsu.native.windows]
installer = "msi"

[package.metadata.tairitsu.native.macos]
category = "public.app-category.developer-tools"
minimum-system-version = "10.13"

[package.metadata.tairitsu.native.linux]
categories = ["Development", "WebDevelopment"]
