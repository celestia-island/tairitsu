[package]
name = "tairitsu-website"
version = "0.1.0"
edition = "2021"
description = "Tairitsu framework website demo - showcasing rsx!, builders, and reactive system"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Tairitsu framework packages
tairitsu-vdom = { path = "../../packages/vdom" }
tairitsu-hooks = { path = "../../packages/hooks" }
tairitsu-macros = { path = "../../packages/macros" }
tairitsu-web = { path = "../../packages/web", features = ["wit-bindings"] }

# Logging and error handling
tracing = "^0.1"
tracing-wasm = "^0.2"
anyhow = "^1"

# Tairitsu Package configuration (replaces HTML template)
[package.metadata.tairitsu]
app-name = "Tairitsu Framework Demo"
title = "Tairitsu - Rust Web Framework Demo"
description = "Comprehensive demo showcasing Virtual DOM, rsx! macro, Builders, and Reactive System"

[package.metadata.tairitsu.build]
target = "component"
output-dir = "dist"
optimize = true
sourcemap = true

[package.metadata.tairitsu.dev]
port = 3001
hot-reload = true
open-browser = false

[package.metadata.tairitsu.html]
lang = "zh-CN"
charset = "UTF-8"
viewport = "width=device-width, initial-scale=1.0"
favicon = "public/favicon.ico"
head = """
<meta name="theme-color" content="#667eea">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./site.css">
<script>
	(() => {
		const SUPPORTED = ["en-US", "zh-CHS", "zh-CHT", "ja-JP", "ko-KR", "fr-FR", "es-ES", "ru-RU"];
		const DEFAULT_LANG = "zh-CHS";

		const normalize = (value) => {
			if (!value) return null;
			const exact = SUPPORTED.find((item) => item.toLowerCase() === String(value).toLowerCase());
			if (exact) return exact;

			const short = String(value).slice(0, 2).toLowerCase();
			const byPrefix = SUPPORTED.find((item) => item.slice(0, 2).toLowerCase() === short);
			return byPrefix || null;
		};

		const queryLang = new URLSearchParams(location.search).get("lang");
		const storedLang = localStorage.getItem("tairitsu.demo.lang");
		const browserLang = navigator.language || (navigator.languages && navigator.languages[0]);
		const active = normalize(queryLang) || normalize(storedLang) || normalize(browserLang) || DEFAULT_LANG;

		const apply = (lang) => {
			const next = normalize(lang) || DEFAULT_LANG;
			document.querySelectorAll(".lang-pane").forEach((pane) => {
				pane.classList.remove("is-active");
			});
			const activePane = document.querySelector(`.locale-${next}`);
			if (activePane) {
				activePane.classList.add("is-active");
			}

			document.documentElement.setAttribute("lang", next);
			localStorage.setItem("tairitsu.demo.lang", next);

			const selector = document.getElementById("lang-switch");
			if (selector && selector.value !== next) {
				selector.value = next;
			}

			const url = new URL(location.href);
			url.searchParams.set("lang", next);
			history.replaceState(null, "", url.toString());
		};

		document.addEventListener("DOMContentLoaded", () => {
			const selector = document.getElementById("lang-switch");
			if (selector) {
				selector.addEventListener("change", (event) => {
					apply(event.target.value);
				});
			}
			apply(active);
		});
	})();
</script>
"""
body-class = "tairitsu-app"

[package.metadata.tairitsu.assets]
inline-limit = 8192
include = ["public/**"]
exclude = ["**/*.md"]

[package.metadata.tairitsu.css]
autoprefixer = true
minify = true

[package.metadata.tairitsu.native]
identifier = "com.tairitsu.website"
icon = "public/icon.png"
copyright = "Copyright 2024 Tairitsu"

[package.metadata.tairitsu.native.windows]
installer = "msi"

[package.metadata.tairitsu.native.macos]
category = "public.app-category.developer-tools"
minimum-system-version = "10.13"

[package.metadata.tairitsu.native.linux]
categories = ["Development", "WebDevelopment"]
