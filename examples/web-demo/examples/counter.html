<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Counter - Tairitsu Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .counter-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        
        .count-display {
            font-size: 72px;
            font-weight: bold;
            color: #0066cc;
            margin: 30px 0;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }
        
        button {
            padding: 12px 24px;
            font-size: 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #0066cc;
            color: white;
        }
        
        .btn-primary:hover {
            background: #0052a3;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #666;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #555;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: #cc0000;
            color: white;
        }
        
        .btn-danger:hover {
            background: #990000;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="counter-card">
        <h1>Simple Counter</h1>
        <div class="count-display" id="count">0</div>
        <div class="button-group">
            <button class="btn-secondary" onclick="decrement()">− Decrement</button>
            <button class="btn-danger" onclick="reset()">↺ Reset</button>
            <button class="btn-primary" onclick="increment()">+ Increment</button>
        </div>
    </div>
    
    <script>
        let count = 0;
        const countDisplay = document.getElementById('count');
        
        function updateDisplay() {
            countDisplay.textContent = count;
            countDisplay.style.transform = 'scale(1.1)';
            setTimeout(() => {
                countDisplay.style.transform = 'scale(1)';
            }, 100);
        }
        
        function increment() {
            count++;
            updateDisplay();
        }
        
        function decrement() {
            count--;
            updateDisplay();
        }
        
        function reset() {
            count = 0;
            updateDisplay();
        }
    </script>
</body>
</html>
