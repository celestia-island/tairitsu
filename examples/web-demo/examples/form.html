<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Components - Tairitsu Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="password"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #0066cc;
        }
        
        .checkbox-group,
        .radio-group {
            margin-top: 10px;
        }
        
        .checkbox-label,
        .radio-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 8px 0;
        }
        
        input[type="checkbox"],
        input[type="radio"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 20px;
        }
        
        button[type="submit"]:hover {
            background: #0052a3;
        }
        
        button[type="submit"]:active {
            transform: translateY(1px);
        }
        
        .switch-container {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }
        
        .switch {
            position: relative;
            width: 50px;
            height: 26px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 26px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #0066cc;
        }
        
        input:checked + .slider:before {
            transform: translateX(24px);
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>📝 Form Components</h1>
        
        <form onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="country">Country</label>
                <select id="country">
                    <option value="">Select a country</option>
                    <option value="us">United States</option>
                    <option value="uk">United Kingdom</option>
                    <option value="cn">China</option>
                    <option value="jp">Japan</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Interests</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" value="coding">
                        Coding
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" value="design">
                        Design
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" value="music">
                        Music
                    </label>
                </div>
            </div>
            
            <div class="form-group">
                <label>Gender</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="gender" value="male">
                        Male
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="female">
                        Female
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="other">
                        Other
                    </label>
                </div>
            </div>
            
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" rows="4" placeholder="Enter your message"></textarea>
            </div>
            
            <div class="switch-container">
                <label class="switch">
                    <input type="checkbox" id="notifications">
                    <span class="slider"></span>
                </label>
                <span style="margin-left: 10px;">Enable notifications</span>
            </div>
            
            <button type="submit">Submit Form</button>
        </form>
    </div>
    
    <script>
        function handleSubmit(event) {
            event.preventDefault();
            alert('Form submitted! (Check console for data)');
            console.log('Form data:', new FormData(event.target));
        }
    </script>
</body>
</html>
