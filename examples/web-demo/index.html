<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <title>Tairitsu Demo - Rust Web Framework</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        #app {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
        }
        p {
            color: #666;
            text-align: center;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div id="app">Loading...</div>
    
    <script type="module">
        import init from './pkg/tairitsu_web_demo.js';
        init().then(() => {
            console.log('Tairitsu WASM loaded successfully');
        }).catch(error => {
            console.error('Failed to load WASM:', error);
            document.getElementById('app').innerHTML = `
                <div style="color: red; padding: 20px;">
                    <h2>Failed to load WASM module</h2>
                    <p>${error.message}</p>
                    <p>Make sure to run <code>trunk serve</code> or <code>tairitsu dev</code></p>
                </div>
            `;
        });
    </script>
</body>
</html>
