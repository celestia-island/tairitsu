name: Visual Regression

on:
  pull_request:
    paths:
      - 'packages/packager/src/**'
      - 'packages/web/**'
      - 'examples/website/**'
      - 'packages/vdom/**'
      - '.github/workflows/visual-regression.yml'
  push:
    branches: [main, dev]

concurrency:
  group: visual-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-diff:
    name: Visual Diff
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: wasm32-wasip2

      - uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            chromium-browser \
            fonts-noto-cjk

      - name: Build tairitsu (with debug + visual-diff features)
        run: |
          cargo build --package tairitsu-packager --features debug-browser,visual-diff --release

      - name: Start dev server with debug API
        run: |
          cd examples/website
          ../target/release/tairitsu dev --port 3000 --debug --tty &
          echo "Waiting for debug server..."
          for i in $(seq 1 60); do
            sleep 2
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "Debug server ready after ${i}x2s"
              break
            fi
          done

      - name: Capture screenshots via debug API
        run: |
          mkdir -p target/visual-diff/actual
          PAGES=("home" "button" "form" "search" "switch" "feedback" "display" "avatar" "image" "tag" "empty" "comment")
          for page in "${PAGES[@]}"; do
            echo "Capturing /${page}..."
            RESPONSE=$(curl -sf -X POST http://localhost:3001/screenshot \
              -H 'Content-Type: application/json' \
              -d '{"full_page": false}')
            
            if [ $? -eq 0 ] && echo "$RESPONSE" | grep -q '"ok":true'; then
              # Extract base64 data and decode to PNG
              echo "$RESPONSE" | python3 -c "
              import sys, json, base64
              d = json.load(sys.stdin)
              if d.get('ok'):
                  img = base64.b64decode(d['data']['data'])
                  with open('target/visual-diff/actual/${page}.png', 'wb') as f:
                      f.write(img)
                  print('OK')
              else:
                  print('FAIL: ' + str(d))
              "
            else
              echo "SKIP: ${page} (screenshot failed)"
            fi
          done

      - name: Run visual diff comparison
        id: diff
        continue-on-error: true
        run: |
          if [ ! -d "tests/visual/baseline" ] || [ -z "$(ls -A tests/visual/baseline 2>/dev/null)" ]; then
            echo "No baseline images found — creating initial baseline"
            mkdir -p tests/visual/baseline
            cp target/visual-diff/actual/*.png tests/visual/baseline/ 2>/dev/null || true
            echo "baseline_created=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          target/release/tairitsu visual-diff \
            --actual-dir target/visual-diff/actual \
            --baseline-dir tests/visual/baseline \
            --output-dir target/visual-diff \
            --tolerance 0.01 || true
          
          echo "diff_complete=true" >> $GITHUB_OUTPUT

      - name: Upload diff report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff-report
          path: target/visual-diff/
          retention-days: 14

      - name: Update baseline on main branch
        if: github.ref == 'refs/heads/main' && steps.diff.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp target/visual-diff/actual/*.png tests/visual/baseline/
          git add tests/visual/baseline/
          git commit -m "chore: update visual baseline images" || echo "No changes"
          git push || echo "Push not needed"

      - name: Comment on PR with results
        if: github.event_name == 'pull_request' && steps.diff.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let reportPath = 'target/visual-diff/report.json';
            let comment = '';
            
            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              const status = report.failed === 0 ? '✅ All visual tests passed' : `❌ ${report.failed}/${report.total} test(s) failed`;
              
              comment = `## Visual Regression Report\n\n**Status:** ${status}\n**Tolerance:** ${report.tolerance * 100}%\n**Results:** ${report.passed} passed, ${report.failed} failed of ${report.total} total\n\n`;
              
              if (report.failed > 0) {
                comment += '| Page | Status | Diff Ratio |\n|------|--------|------------|\n';
                report.results.forEach(r => {
                  const icon = r.passed ? '✅' : '❌';
                  comment += `| \`${r.name}\` | ${icon} | ${(r.pixel_diff_ratio * 100).toFixed(4)}% |\n`;
                });
                comment += '\n📎 See the full HTML report in the **visual-diff-report** artifact.\n';
              }
            } else {
              comment = '## ⚠️ Visual Regression\n\nReport generation failed. Check the job logs.';
            }
            
            // Find existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Visual Regression Report')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }

      - name: Fail on visual diff failures
        if: steps.diff.outcome == 'success' && github.ref != 'refs/heads/main'
        run: |
          if [ -f target/visual-diff/report.json ]; then
            FAILED=$(python3 -c "import json; print(json.load(open('target/visual-diff/report.json'))['failed'])")
            if [ "$FAILED" -gt 0 ]; then
              echo "::error::Visual regression: $FAILED screenshot(s) exceeded tolerance threshold"
              exit 1
            fi
          fi
