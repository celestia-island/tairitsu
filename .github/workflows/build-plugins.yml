name: Build & Release Plugin Binaries

on:
  push:
    tags: [v*]
  workflow_dispatch:

jobs:
  build-plugin:
    name: Build ${{ matrix.plugin }} (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        plugin: [tairitsu-plugin-debug-browser]
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            plugin: tairitsu-plugin-debug-browser
          - target: aarch64-apple-darwin
            runner: macos-latest
            plugin: tairitsu-plugin-debug-browser
          - target: x86_64-apple-darwin
            runner: macos-13
            plugin: tairitsu-plugin-debug-browser
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            plugin: tairitsu-plugin-debug-browser

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build plugin
        run: cargo build --release --package tairitsu-mcp-plugin-browser --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p upload/plugins/debug-browser
          cp target/${{ matrix.target }}/release/${{ matrix.plugin }} upload/plugins/debug-browser/${{ matrix.plugin }}-${{ matrix.target }}
          chmod +x upload/plugins/debug-browser/${{ matrix.plugin }}-${{ matrix.target }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p upload/plugins/debug-browser
          cp target/${{ matrix.target }}/release/${{ matrix.plugin }}.exe upload/plugins/debug-browser/${{ matrix.plugin }}-${{ matrix.target }}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.plugin }}-${{ matrix.target }}
          path: upload/
          retention-days: 7

  release:
    name: Upload to GitHub Release
    runs-on: ubuntu-latest
    needs: build-plugin
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: all-plugins/
          merge-multiple: true

      - name: List plugin artifacts
        run: find all-plugins/ -type f | head -50

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: all-plugins/**
          fail_on_unmatched_files: false
