name: Publish

on:
  push:
    tags: [v*]

jobs:
  verify:
    name: Verify versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Check all publishable packages match tag
        run: |
          TAG="${{ steps.tag.outputs.version }}"
          FAIL=0
          PACKAGES=(
            "tairitsu:packages/runtime"
            "tairitsu-macros:packages/macros"
            "tairitsu-browser-worlds:packages/browser-worlds"
            "tairitsu-vdom:packages/vdom"
            "tairitsu-style:packages/style"
            "tairitsu-hooks:packages/hooks"
            "tairitsu-browser-wit-resolver:packages/browser-wit-resolver"
            "tairitsu-ssr:packages/ssr"
            "tairitsu-packager:packages/packager"
            "tairitsu-web:packages/web"
            "tairitsu-mcp:packages/mcp"
          )
          for ENTRY in "${PACKAGES[@]}"; do
            PKG="${ENTRY%%:*}"
            DIR="${ENTRY##*:}"
            TOML="$DIR/Cargo.toml"
            if [ ! -f "$TOML" ]; then
              echo "::error::$TOML not found"
              FAIL=1
              continue
            fi
            VER=$(grep -oP '^version\s*=\s*"\K[^"]+' "$TOML" 2>/dev/null || true)
            if [ -z "$VER" ]; then
              VER=$(grep -q 'version\.workspace\s*=\s*true' "$TOML" && echo "workspace" || echo "MISSING")
            fi
            if [ "$VER" = "workspace" ]; then
              ROOT_VER=$(grep -oP '^version\s*=\s*"\K[^"]+' Cargo.toml | head -1)
              echo "::notice::$PKG uses workspace version ($ROOT_VER)"
            elif [ "$VER" = "$TAG" ]; then
              echo "::notice::$PKG version ($VER) matches tag"
            else
              echo "::error::$PKG version ($VER) != tag ($TAG) in $TOML"
              FAIL=1
            fi
          done
          ROOT_VER=$(grep -oP '^version\s*=\s*"\K[^"]+' Cargo.toml | head -1)
          if [ "$ROOT_VER" != "$TAG" ]; then
            echo "::error::workspace.package version ($ROOT_VER) != tag ($TAG)"
            FAIL=1
          fi
          [ "$FAIL" -eq 0 ] || exit 1
          echo "All versions match v$TAG"

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - run: cargo login ${{ secrets.CRATES_IO_API_TOKEN }}

      # Publish in dependency order
      - run: cargo publish -p tairitsu-macros                  --allow-dirty -v
      - run: cargo publish -p tairitsu-browser-worlds          --allow-dirty -v
      - run: cargo publish -p tairitsu-vdom                    --allow-dirty -v
      - run: cargo publish -p tairitsu                       --allow-dirty -v
      - run: cargo publish -p tairitsu-style                   --allow-dirty -v
      - run: cargo publish -p tairitsu-hooks                   --allow-dirty -v
      - run: cargo publish -p tairitsu-browser-wit-resolver    --allow-dirty -v
      - run: cargo publish -p tairitsu-ssr                     --allow-dirty -v
      - run: cargo publish -p tairitsu-packager                --allow-dirty -v
      - run: cargo publish -p tairitsu-web                     --allow-dirty -v
      - run: cargo publish -p tairitsu-mcp                     --allow-dirty -v

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org/

      - name: Install esbuild
        run: npm install -g esbuild

      - name: Build glue packages
        run: python3 scripts/build_npm_glue_packages.py

      - name: Publish
        run: |
          cd packages/npm/celestia-tairitsu-web-glue
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
