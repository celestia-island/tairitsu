name: Publish crates.io
on:
  push:
    tags: [v*]

jobs:
  verify-versions:
    name: Verify version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Check all publishable packages match tag
        run: |
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          FAIL=0
          # Packages that should be published (must match release.toml)
          PACKAGES=(
            "tairitsu-macros"
            "tairitsu-browser-worlds"
            "tairitsu-vdom"
            "tairitsu"
            "tairitsu-style"
            "tairitsu-hooks"
            "tairitsu-browser-wit-resolver"
            "tairitsu-ssr"
            "tairitsu-web"
            "tairitsu-packager"
          )
          for PKG in "${PACKAGES[@]}"; do
            case "$PKG" in
              tairitsu)          DIR="packages/runtime" ;;
              tairitsu-macros)   DIR="packages/macros" ;;
              tairitsu-vdom)     DIR="packages/vdom" ;;
              tairitsu-hooks)    DIR="packages/hooks" ;;
              tairitsu-style)    DIR="packages/style" ;;
              tairitsu-web)      DIR="packages/web" ;;
              tairitsu-ssr)      DIR="packages/ssr" ;;
              tairitsu-packager) DIR="packages/packager" ;;
              tairitsu-browser-worlds)      DIR="packages/browser-worlds" ;;
              tairitsu-browser-wit-resolver) DIR="packages/browser-wit-resolver" ;;
              *)                 DIR="packages/$PKG" ;;
            esac

            # Check workspace.package version in root Cargo.toml
            ROOT_VER=$(grep -oP '^version\s*=\s*"\K[^"]+' Cargo.toml | head -1)
            if [ "$ROOT_VER" != "$TAG_VERSION" ]; then
              echo "::error::workspace.package version ($ROOT_VER) != tag ($TAG_VERSION) in Cargo.toml"
              FAIL=1
            fi

            # Check individual package manifest (resolve workspace inheritance)
            PKG_VER=$(cargo metadata --format-version 1 --no-deps 2>/dev/null \
              | python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; \
              p=[x for x in pkgs if x['name']=='$PKG']; \
              print(p[0]['version'] if p else 'NOT_FOUND')")
            if [ "$PKG_VER" != "$TAG_VERSION" ]; then
              echo "::error::$PKG version ($PKG_VER) != tag ($TAG_VERSION)"
              FAIL=1
            else
              echo "::notice::$PKG version matches tag: $TAG_VERSION"
            fi
          done
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Version mismatch detected. Bump workspace.package.version and run 'cargo check' before tagging."
            exit 1
          fi
          echo "All versions match tag v$TAG_VERSION"

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify-versions

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - run: cargo install cargo-release
      - run: cargo login ${{ secrets.CRATES_IO_API_TOKEN }}

      # Publish in dependency order (leaf packages first)
      # cargo release handles ordering via release.toml, but we list explicitly for safety
      - run: cargo publish -p tairitsu-macros         --allow-dirty
      - run: cargo publish -p tairitsu-browser-worlds  --allow-dirty
      - run: cargo publish -p tairitsu-vdom            --allow-dirty
      - run: cargo publish -p tairitsu                  --allow-dirty
      - run: cargo publish -p tairitsu-style            --allow-dirty
      - run: cargo publish -p tairitsu-hooks            --allow-dirty
      - run: cargo publish -p tairitsu-browser-wit-resolver --allow-dirty
      - run: cargo publish -p tairitsu-ssr              --allow-dirty
      - run: cargo publish -p tairitsu-web              --allow-dirty
      - run: cargo publish -p tairitsu-packager         --allow-dirty --all-features
