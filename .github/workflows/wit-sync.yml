name: WIT Sync with W3C

on:
  schedule:
    # 每周日 UTC 00:00 运行
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-fetch all WebIDL specs'
        required: false
        type: boolean
        default: false
      create_pr:
        description: 'Create PR for changes'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync W3C WebIDL and Generate WIT
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache WIT build
        uses: actions/cache@v4
        with:
          path: target/tairitsu-wit
          key: wit-${{ hashFiles('scripts/fetch_webidl.py', 'scripts/gen_wit_from_webidl.py') }}
          restore-keys: |
            wit-

      - name: Fetch W3C WebIDL
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python3 scripts/fetch_webidl.py --force
          else
            python3 scripts/fetch_webidl.py
          fi

      - name: Generate WIT files
        run: |
          python3 scripts/generate_browser_wit.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --exit-code packages/browser-worlds/wit/generated/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No WIT changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "WIT changes detected!"
            git diff --stat packages/browser-worlds/wit/generated/
          fi

      - name: Create summary
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "# WIT Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Changed Files" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --stat packages/browser-worlds/wit/generated/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.create_pr != 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          title: 'chore: sync W3C WebIDL and regenerate WIT files'
          body: |
            ## Automated W3C WebIDL Sync

            This PR was automatically generated by the WIT Sync workflow.

            ### Changes
            - Synced with w3c/webref
            - Regenerated WIT files from latest WebIDL specs
            - Updated packages/browser-worlds/wit/generated/

            ### Verification
            Please review the generated WIT files to ensure correctness before merging.
          branch: wit-sync-auto
          commit-message: 'chore: sync W3C WebIDL and regenerate WIT files'
          labels: |
            automated
            wit-sync
          delete-branch: true
